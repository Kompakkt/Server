name: Generate OpenAPI Types

on:
  push:
    branches: [main]

jobs:
  generate-openapi:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Generate OpenAPI types
        run: bun run generate:openapi

      - name: Deploy to openapi-types branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan openapi-types
          git rm -rf --ignore-unmatch .
          cp e2e-out/openapi-server-types.ts .
          cp e2e-out/package.json .
          git add openapi-server-types.ts package.json
          git diff --staged --quiet || git commit -m "chore: update openapi types [skip ci]"
          git push --force origin openapi-types
